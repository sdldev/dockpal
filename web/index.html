<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dockpal</title>
<link rel="stylesheet" href="/assets/styles.css">
<script src="/assets/vendor/tailwind.min.js"></script>
<script defer src="/assets/vendor/alpine.min.js"></script>
<script src="/assets/vendor/chart.umd.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐳</text></svg>">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen antialiased" x-data="dockpalApp()" x-init="init()">

<!--#include "partials/login.html"-->

<!-- Main App View -->
<div x-show="view === 'app'" x-cloak class="flex h-screen overflow-hidden">

<!--#include "partials/sidebar.html"-->

  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">

<!--#include "partials/header.html"-->

    <!-- Update Modal -->
    <div x-show="updateModalVisible" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4">
      <!-- Backdrop -->
      <div x-show="updateModalVisible" @click="closeUpdateModal()" class="absolute inset-0 bg-black/70 backdrop-blur-sm"
        x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"></div>
      <!-- Modal -->
      <div x-show="updateModalVisible" class="relative bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col"
        x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-500/20 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
            </div>
            <h3 class="text-base font-semibold text-white">Update Available</h3>
          </div>
          <button @click="closeUpdateModal()" class="text-zinc-500 hover:text-zinc-300 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <!-- Body -->
        <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
          <!-- Version info -->
          <div>
            <div class="text-blue-400 font-semibold text-sm" x-text="'v' + updateVersion"></div>
            <p class="text-sm text-zinc-400 mt-1">Current version v<span x-text="currentVersion"></span>, a new version is available.</p>
          </div>
          <!-- Progress bar (during update) -->
          <template x-if="updateProgress">
            <div class="space-y-2">
              <div class="flex items-center justify-between text-xs">
                <span class="text-zinc-400" x-text="updateProgress.message"></span>
                <span class="text-zinc-500" x-text="updateProgress.percentage + '%'"></span>
              </div>
              <div class="w-full h-2 bg-zinc-800 rounded-full overflow-hidden">
                <div class="h-full rounded-full transition-all duration-500"
                  :class="updateProgress.status === 'error' ? 'bg-red-500' : 'bg-blue-500'"
                  :style="'width: ' + updateProgress.percentage + '%'"></div>
              </div>
            </div>
          </template>
          <!-- Changelog -->
          <template x-if="updateReleaseNotes && !updateProgress">
            <div class="border-t border-zinc-800 pt-4">
              <h4 class="text-xs font-semibold text-zinc-300 uppercase tracking-wider mb-3">What's New</h4>
              <div class="text-sm text-zinc-400 leading-relaxed space-y-2 max-h-60 overflow-y-auto pr-2 whitespace-pre-wrap" x-text="updateReleaseNotes"></div>
            </div>
          </template>
        </div>
        <!-- Footer -->
        <div class="px-6 py-4 border-t border-zinc-800 flex items-center justify-end gap-3">
          <template x-if="!updateProgress">
            <div class="flex items-center gap-3 w-full justify-between">
              <button @click="closeUpdateModal()" class="px-4 py-2 text-sm text-zinc-400 hover:text-zinc-200 transition-colors">
                Cancel
              </button>
              <div class="flex items-center gap-2">
                <button @click="skipVersion()" class="px-4 py-2 text-sm bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-md border border-zinc-700 transition-colors">
                  Skip this version
                </button>
                <button @click="performUpdate()" class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-500 text-white rounded-md font-medium transition-colors flex items-center gap-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                  Update Now
                </button>
              </div>
            </div>
          </template>
          <template x-if="updateProgress && updateProgress.status === 'error'">
            <button @click="clearProgress()" class="px-4 py-2 text-sm bg-zinc-800 hover:bg-zinc-700 text-zinc-300 rounded-md border border-zinc-700 transition-colors">
              Close
            </button>
          </template>
        </div>
      </div>
    </div>

    <!-- Page content -->
    <div class="flex-1 overflow-y-auto p-6">
      <!--#include "pages/dashboard.html"-->
      <!--#include "pages/fleet.html"-->
      <!--#include "pages/containers.html"-->
      <!--#include "pages/container-detail.html"-->
      <!--#include "pages/deploy.html"-->
      <!--#include "pages/templates.html"-->
      <!--#include "pages/template-config.html"-->
      <!--#include "pages/images.html"-->
      <!--#include "pages/files.html"-->
      <!--#include "pages/domains.html"-->
      <!--#include "pages/registry.html"-->
      <!--#include "pages/instances.html"-->
      <!--#include "pages/add-instance.html"-->
    </div>
  </main>
</div>

<!--#include "partials/confirm-dialog.html"-->

<!--#include "partials/toast.html"-->

<script src="/assets/modules/state.js"></script>
<script src="/assets/modules/ui.js"></script>
<script src="/assets/modules/auth.js"></script>
<script src="/assets/modules/charts.js"></script>
<script src="/assets/modules/computed.js"></script>
<script src="/assets/modules/dashboard.js"></script>
<script src="/assets/modules/containers.js"></script>
<script src="/assets/modules/templates.js"></script>
<script src="/assets/modules/services.js"></script>
<script src="/assets/modules/images.js"></script>
<script src="/assets/modules/domains.js"></script>
<script src="/assets/modules/files.js"></script>
<script src="/assets/modules/updateBanner.js"></script>
<script src="/assets/modules/registry.js"></script>
<script src="/assets/modules/fleet.js"></script>
<script src="/assets/app.js"></script>
</body>
</html>

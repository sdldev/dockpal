      <!-- ===== DASHBOARD ===== -->
      <div x-show="currentPage === 'dashboard'" x-cloak>

        <!-- Header row with greeting -->
        <div class="mb-6">
          <h2 class="text-xl font-semibold text-white">Overview</h2>
          <p class="text-sm text-zinc-500 mt-0.5" x-text="'Server: ' + (systemInfo?.hostname || '—') + ' • Docker ' + (systemInfo?.docker_version || '') + ' • ' + (systemInfo?.cpu_cores || 0) + ' cores'"></p>
        </div>

        <!-- Resource gauges row -->
        <div x-show="systemInfo" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <!-- CPU gauge -->
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-sm bg-blue-500/10 border border-blue-500/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/></svg>
              </div>
              <div>
                <div class="text-xs text-zinc-500 uppercase tracking-wider">CPU</div>
                <div class="text-2xl font-bold text-white leading-tight" x-text="(systemInfo?.cpu_percent || 0).toFixed(1) + '%'"></div>
              </div>
            </div>
            <div class="w-full bg-zinc-800/80 rounded-full h-1.5">
              <div class="bg-gradient-to-r from-blue-500 to-blue-400 h-1.5 rounded-full transition-all duration-700 ease-out" :style="'width:' + Math.min(systemInfo?.cpu_percent || 0, 100) + '%'"></div>
            </div>
          </div>

          <!-- RAM gauge -->
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-sm bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
              </div>
              <div>
                <div class="text-xs text-zinc-500 uppercase tracking-wider">Memory</div>
                <div class="text-2xl font-bold text-white leading-tight" x-text="(systemInfo?.total_ram > 0 ? (systemInfo.used_ram / systemInfo.total_ram * 100).toFixed(1) : '0') + '%'"></div>
              </div>
              <div class="ml-auto text-right">
                <div class="text-xs text-zinc-500" x-text="formatBytes(systemInfo?.used_ram || 0)"></div>
                <div class="text-[10px] text-zinc-600" x-text="'of ' + formatBytes(systemInfo?.total_ram || 0)"></div>
              </div>
            </div>
            <div class="w-full bg-zinc-800/80 rounded-full h-1.5">
              <div class="bg-gradient-to-r from-emerald-500 to-emerald-400 h-1.5 rounded-full transition-all duration-700 ease-out" :style="'width:' + (systemInfo?.total_ram > 0 ? (systemInfo.used_ram / systemInfo.total_ram * 100) : 0) + '%'"></div>
            </div>
          </div>

          <!-- Disk gauge -->
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-sm bg-violet-500/10 border border-violet-500/20 flex items-center justify-center">
                <svg class="w-5 h-5 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
              </div>
              <div>
                <div class="text-xs text-zinc-500 uppercase tracking-wider">Disk</div>
                <div class="text-2xl font-bold text-white leading-tight" x-text="(systemInfo?.total_disk > 0 ? (systemInfo.used_disk / systemInfo.total_disk * 100).toFixed(1) : '0') + '%'"></div>
              </div>
              <div class="ml-auto text-right">
                <div class="text-xs text-zinc-500" x-text="formatBytes(systemInfo?.used_disk || 0)"></div>
                <div class="text-[10px] text-zinc-600" x-text="'of ' + formatBytes(systemInfo?.total_disk || 0)"></div>
              </div>
            </div>
            <div class="w-full bg-zinc-800/80 rounded-full h-1.5">
              <div class="h-1.5 rounded-full transition-all duration-700 ease-out" :class="(systemInfo && systemInfo.used_disk / systemInfo.total_disk > 0.85) ? 'bg-gradient-to-r from-red-500 to-orange-400' : 'bg-gradient-to-r from-violet-500 to-violet-400'" :style="'width:' + (systemInfo?.total_disk > 0 ? (systemInfo.used_disk / systemInfo.total_disk * 100) : 0) + '%'"></div>
            </div>
          </div>
        </div>

        <!-- Live chart -->
        <div x-show="systemInfo" class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-medium text-zinc-400 uppercase tracking-wider">CPU Usage</span>
              <span class="text-xs text-blue-400 font-semibold" x-text="(systemInfo?.cpu_percent || 0).toFixed(1) + '%'"></span>
            </div>
            <div class="h-36">
              <canvas id="cpuChart"></canvas>
            </div>
          </div>
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-medium text-zinc-400 uppercase tracking-wider">Memory Usage</span>
              <span class="text-xs text-emerald-400 font-semibold" x-text="(systemInfo?.total_ram > 0 ? (systemInfo.used_ram / systemInfo.total_ram * 100).toFixed(1) : '0') + '%'"></span>
            </div>
            <div class="h-36">
              <canvas id="ramChart"></canvas>
            </div>
          </div>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center gap-2 mb-2">
              <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
              <span class="text-xs text-zinc-500 uppercase tracking-wider">Running</span>
            </div>
            <div class="text-3xl font-bold text-white" x-text="containers.filter(c=>c.state==='running').length">0</div>
          </div>
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center gap-2 mb-2">
              <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              <span class="text-xs text-zinc-500 uppercase tracking-wider">Stopped</span>
            </div>
            <div class="text-3xl font-bold text-white" x-text="containers.filter(c=>c.state!=='running').length">0</div>
          </div>
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center gap-2 mb-2">
              <svg class="w-3.5 h-3.5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
              <span class="text-xs text-zinc-500 uppercase tracking-wider">Containers</span>
            </div>
            <div class="text-3xl font-bold text-white" x-text="containers.length">0</div>
          </div>
          <div class="bg-zinc-900/80 backdrop-blur border border-zinc-800/60 rounded-sm p-5">
            <div class="flex items-center gap-2 mb-2">
              <svg class="w-3.5 h-3.5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span class="text-xs text-zinc-500 uppercase tracking-wider">Images</span>
            </div>
            <div class="text-3xl font-bold text-white" x-text="imageCount">0</div>
          </div>
        </div>
      </div>

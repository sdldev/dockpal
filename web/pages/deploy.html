      <!-- ===== DEPLOY ===== -->
      <div x-show="currentPage === 'deploy'">
        <div class="mb-6">
          <h2 class="text-lg font-semibold text-white">Deploy Application</h2>
          <p class="text-sm text-zinc-500">Deploy from Compose YAML or Git repository</p>
        </div>
        <div class="grid lg:grid-cols-2 gap-6">
          <!-- Compose -->
          <div class="bg-zinc-900 border border-zinc-800 rounded-sm p-5 space-y-4">
            <h3 class="text-sm font-semibold text-white">Docker Compose</h3>
            <form @submit.prevent="deployCompose()" class="space-y-3">
              <div class="space-y-1.5">
                <label class="text-xs text-zinc-400">Service Name</label>
                <input type="text" x-model="deployForm.name" required
                  class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
              </div>
              <div class="space-y-1.5">
                <label class="text-xs text-zinc-400">Domain <span class="text-zinc-600">(optional)</span></label>
                <input type="text" x-model="deployForm.domain"
                  class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
              </div>
              <div class="space-y-1.5">
                <label class="text-xs text-zinc-400">Compose YAML</label>
                <textarea x-model="deployForm.compose" rows="8" required
                  class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white font-mono placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent resize-none"
                  placeholder="services:&#10;  nginx:&#10;    image: nginx:alpine&#10;    ports:&#10;      - '8080:80'"></textarea>
              </div>
              <button type="submit" class="w-full py-2.5 bg-white hover:bg-zinc-200 text-zinc-900 rounded-sm text-sm font-medium transition-all active:scale-[0.98]">Deploy</button>
            </form>
          </div>
          <!-- Git -->
          <div class="bg-zinc-900 border border-zinc-800 rounded-sm p-5 space-y-4">
            <h3 class="text-sm font-semibold text-white">Git Repository</h3>
            <form @submit.prevent="deployGit()" class="space-y-3">
              <div class="space-y-1.5">
                <label class="text-xs text-zinc-400">Repository URL</label>
                <input type="text" x-model="gitForm.repo" required
                  class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
              </div>
              <div class="space-y-1.5">
                <label class="text-xs text-zinc-400">Branch <span class="text-zinc-600">(optional)</span></label>
                <input type="text" x-model="gitForm.branch" placeholder="main"
                  class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
              </div>
              <div class="space-y-1.5">
                <label class="text-xs text-zinc-400">Access Token <span class="text-zinc-600">(required for private repos)</span></label>
                <input type="password" x-model="gitForm.token" placeholder="ghp_xxxxxxxxxxxx"
                  class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
                <p class="text-xs text-zinc-600">GitHub PAT with <code class="text-zinc-500">repo</code> scope for private repositories</p>
              </div>
              <button type="submit" class="w-full py-2.5 bg-white hover:bg-zinc-200 text-zinc-900 rounded-sm text-sm font-medium transition-all active:scale-[0.98]">Deploy from Git</button>
            </form>
          </div>
        </div>

        <!-- Managed Services -->
        <div class="mt-8">
          <h3 class="text-sm font-semibold text-white mb-3">Managed Services</h3>
          <div class="bg-zinc-900 border border-zinc-800 rounded-sm overflow-hidden">
            <table class="w-full">
              <thead>
                <tr class="border-b border-zinc-800">
                  <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500">Name</th>
                  <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500">Type</th>
                  <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500 hidden sm:table-cell">Domain</th>
                  <th class="text-right px-4 py-2.5 text-xs font-medium text-zinc-500"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="s in services" :key="s.id">
                  <tr class="border-b border-zinc-800/50">
                    <td class="px-4 py-2.5 text-sm text-white" x-text="s.name"></td>
                    <td class="px-4 py-2.5 text-sm text-zinc-400" x-text="s.type"></td>
                    <td class="px-4 py-2.5 text-sm text-zinc-400 hidden sm:table-cell" x-text="s.domain || '—'"></td>
                    <td class="px-4 py-2.5 text-right">
                      <button @click="deleteService(s.id)" class="btn-action btn-danger" data-tip="Delete">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                      </button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
            <div x-show="services.length === 0" class="text-center py-8 text-zinc-600 text-sm">No managed services</div>
          </div>
        </div>
      </div>

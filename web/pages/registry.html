      <!-- ===== REGISTRY ===== -->
      <div x-show="currentPage === 'registry'">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-lg font-semibold text-white">Registry Credentials</h2>
            <p class="text-sm text-zinc-500">Manage private container registry authentication</p>
          </div>
          <button @click="registryFormVisible = !registryFormVisible; registryFormErrors = { registry: '', username: '', token: '' }"
            class="px-4 py-2 bg-white hover:bg-zinc-200 text-zinc-900 rounded-sm text-sm font-medium transition-all active:scale-[0.98]">
            <span x-text="registryFormVisible ? 'Cancel' : 'Add Registry'"></span>
          </button>
        </div>

        <!-- Add Registry Form -->
        <div x-show="registryFormVisible" x-transition class="bg-zinc-900 border border-zinc-800 rounded-sm p-4 mb-4">
          <form @submit.prevent="addRegistry()" class="space-y-3">
            <div>
              <label class="block text-xs font-medium text-zinc-400 mb-1">Registry URL</label>
              <input type="text" x-model="registryForm.registry" placeholder="ghcr.io" maxlength="253"
                class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                :class="registryFormErrors.registry && 'border-red-500'">
              <p x-show="registryFormErrors.registry" x-text="registryFormErrors.registry" class="text-xs text-red-400 mt-1"></p>
            </div>
            <div>
              <label class="block text-xs font-medium text-zinc-400 mb-1">Username <span class="text-red-400">*</span></label>
              <input type="text" x-model="registryForm.username" placeholder="GitHub username" maxlength="100"
                class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                :class="registryFormErrors.username && 'border-red-500'">
              <p x-show="registryFormErrors.username" x-text="registryFormErrors.username" class="text-xs text-red-400 mt-1"></p>
            </div>
            <div>
              <label class="block text-xs font-medium text-zinc-400 mb-1">Token <span class="text-red-400">*</span></label>
              <input type="password" x-model="registryForm.token" placeholder="ghp_xxxxxxxxxxxx" maxlength="255"
                class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent"
                :class="registryFormErrors.token && 'border-red-500'">
              <p x-show="registryFormErrors.token" x-text="registryFormErrors.token" class="text-xs text-red-400 mt-1"></p>
            </div>
            <div class="flex items-center gap-2 pt-1">
              <button type="submit" :disabled="registryLoading"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-sm text-sm font-medium transition-all active:scale-[0.98]">
                <span x-show="!registryLoading">Save Credential</span>
                <span x-show="registryLoading" class="flex items-center gap-2">
                  <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                  Saving...
                </span>
              </button>
            </div>
          </form>
        </div>

        <!-- Loading indicator -->
        <div x-show="registryLoading && !registryFormVisible" class="text-center py-12 text-zinc-500 text-sm">
          <svg class="w-6 h-6 animate-spin mx-auto mb-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          Loading credentials...
        </div>

        <!-- Empty state -->
        <div x-show="!registryLoading && registries.length === 0 && !registryFormVisible" class="text-center py-12">
          <svg class="w-12 h-12 mx-auto mb-3 text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
          <p class="text-zinc-500 text-sm mb-3">No registry credentials stored</p>
          <button @click="registryFormVisible = true"
            class="px-4 py-2 bg-white hover:bg-zinc-200 text-zinc-900 rounded-sm text-sm font-medium transition-all active:scale-[0.98]">
            Add Registry
          </button>
        </div>

        <!-- Credentials table -->
        <div x-show="!registryLoading && registries.length > 0" class="bg-zinc-900 border border-zinc-800 rounded-sm overflow-hidden">
          <table class="w-full">
            <thead>
              <tr class="border-b border-zinc-800">
                <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500">Registry</th>
                <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500 hidden sm:table-cell">Username</th>
                <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500 hidden md:table-cell">Status</th>
                <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500 hidden lg:table-cell">Created</th>
                <th class="text-right px-4 py-2.5 text-xs font-medium text-zinc-500">Actions</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="reg in registries" :key="reg.id">
                <tr class="border-b border-zinc-800/50">
                  <td class="px-4 py-2.5 text-sm text-white" x-text="reg.registry"></td>
                  <td class="px-4 py-2.5 text-sm text-zinc-400 hidden sm:table-cell" x-text="reg.username"></td>
                  <td class="px-4 py-2.5 hidden md:table-cell">
                    <span x-show="reg.status === 'valid'" class="inline-flex items-center gap-1 text-xs text-green-400">
                      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                      Valid
                    </span>
                    <span x-show="reg.status === 'invalid'" class="inline-flex items-center gap-1 text-xs text-red-400">
                      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                      Invalid
                    </span>
                    <span x-show="reg.status !== 'valid' && reg.status !== 'invalid'" class="inline-flex items-center gap-1 text-xs text-zinc-500">
                      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/></svg>
                      Not tested
                    </span>
                  </td>
                  <td class="px-4 py-2.5 text-sm text-zinc-500 hidden lg:table-cell" x-text="new Date(reg.created_at * 1000).toLocaleDateString()"></td>
                  <td class="px-4 py-2.5 text-right">
                    <div class="flex items-center justify-end gap-1">
                      <button @click="testRegistryConnection(reg.id)" :disabled="registryTesting === reg.id"
                        class="btn-action" data-tip="Test Connection"
                        :class="registryTesting === reg.id && 'opacity-50 cursor-not-allowed'">
                        <svg x-show="registryTesting !== reg.id" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <svg x-show="registryTesting === reg.id" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                      </button>
                      <button @click="deleteRegistry(reg.id)" class="btn-action btn-danger" data-tip="Delete">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                      </button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

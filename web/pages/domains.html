      <!-- ===== DOMAINS ===== -->
      <!-- Domains are local-only - hide when remote instance selected (Requirement 12.9) -->
      <div x-show="currentPage === 'domains' && isLocalInstance">
        <div class="mb-6">
          <h2 class="text-lg font-semibold text-white">Domains</h2>
          <p class="text-sm text-zinc-500">Manage custom domains with automatic SSL</p>
        </div>
        <form @submit.prevent="addDomain()" class="flex flex-col sm:flex-row gap-2 mb-4">
          <input type="text" x-model="domainForm.name" placeholder="app.example.com"
            class="flex-1 px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
          <input type="text" x-model="domainForm.service" placeholder="service name"
            class="w-full sm:w-36 px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
          <input type="number" x-model="domainForm.port" placeholder="80"
            class="w-full sm:w-20 px-3 py-2 bg-zinc-900 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
          <button type="submit" class="px-4 py-2 bg-white hover:bg-zinc-200 text-zinc-900 rounded-sm text-sm font-medium transition-all active:scale-[0.98]">Add Domain</button>
        </form>
        <!-- Search -->
        <div class="relative mb-4">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" x-model="filters.domains.search" placeholder="Search domains..."
            class="w-full pl-9 pr-3 py-2 bg-zinc-900 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
        </div>
        <div class="bg-zinc-900 border border-zinc-800 rounded-sm overflow-hidden">
          <table class="w-full">
            <thead>
              <tr class="border-b border-zinc-800">
                <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500">Domain</th>
                <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500 hidden sm:table-cell">Service</th>
                <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500 hidden md:table-cell">Port</th>
                <th class="text-right px-4 py-2.5 text-xs font-medium text-zinc-500"></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="d in filteredDomains" :key="d.id">
                <tr class="border-b border-zinc-800/50">
                  <td class="px-4 py-2.5 text-sm text-white" x-text="d.domain"></td>
                  <td class="px-4 py-2.5 text-sm text-zinc-400 hidden sm:table-cell" x-text="d.service"></td>
                  <td class="px-4 py-2.5 text-sm text-zinc-400 hidden md:table-cell" x-text="d.port"></td>
                  <td class="px-4 py-2.5 text-right">
                    <button @click="deleteDomain(d.id)" class="btn-action btn-danger" data-tip="Delete">
                      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
          <div x-show="filteredDomains.length === 0" class="text-center py-12 text-zinc-600 text-sm">
            <span x-show="domains.length === 0">No domains configured</span>
            <span x-show="domains.length > 0">No domains match your search</span>
          </div>
        </div>
      </div>

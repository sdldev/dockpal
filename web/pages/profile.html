      <!-- ===== PROFILE ===== -->
      <div x-show="currentPage === 'profile'">

        <!-- Loading -->
        <div x-show="profileLoading" class="text-center py-12 text-zinc-500 text-sm">
          <svg class="w-6 h-6 animate-spin mx-auto mb-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          Loading profile...
        </div>

        <div x-show="!profileLoading" class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">

          <!-- Left column -->
          <div class="space-y-6">

            <!-- Account Details -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-sm overflow-hidden">
              <table class="w-full">
                <thead>
                  <tr class="border-b border-zinc-800">
                    <th colspan="2" class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500">Account Details</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="border-b border-zinc-800/50">
                    <td class="px-4 py-2.5 text-sm text-zinc-500 w-32">Username</td>
                    <td class="px-4 py-2.5 text-sm text-white" x-text="profile?.username || username"></td>
                  </tr>
                  <tr class="border-b border-zinc-800/50">
                    <td class="px-4 py-2.5 text-sm text-zinc-500">Role</td>
                    <td class="px-4 py-2.5 text-sm text-white capitalize" x-text="profile?.role || userRole"></td>
                  </tr>
                  <tr>
                    <td class="px-4 py-2.5 text-sm text-zinc-500">Created</td>
                    <td class="px-4 py-2.5 text-sm text-white" x-text="profile?.created_at ? new Date(profile.created_at * 1000).toLocaleDateString() : '—'"></td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- User Management (admin only) -->
            <div x-show="userRole === 'admin'">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-semibold text-white">User Management</h3>
              </div>

              <!-- Loading -->
              <div x-show="usersLoading" class="text-center py-12 text-zinc-500 text-sm">
                <svg class="w-6 h-6 animate-spin mx-auto mb-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                Loading users...
              </div>

              <!-- Users table -->
              <div x-show="!usersLoading" class="bg-zinc-900 border border-zinc-800 rounded-sm overflow-hidden">
                <table class="w-full">
                  <thead>
                    <tr class="border-b border-zinc-800">
                      <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500">User</th>
                      <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500">Role</th>
                      <th class="text-left px-4 py-2.5 text-xs font-medium text-zinc-500 hidden sm:table-cell">Created</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="u in users" :key="u.username">
                      <tr class="border-b border-zinc-800/50">
                        <td class="px-4 py-2.5">
                          <span class="text-sm text-white" x-text="u.username"></span>
                          <span x-show="u.username === username" class="ml-1 text-xs text-zinc-600">(you)</span>
                        </td>
                        <td class="px-4 py-2.5">
                          <!-- Self: read-only text -->
                          <span x-show="u.username === username" class="text-sm text-zinc-400 capitalize" x-text="u.role"></span>
                          <!-- Others: dropdown -->
                          <select x-show="u.username !== username" :value="u.role"
                            @change="updateUserRole(u.username, $event.target.value)"
                            class="px-2 py-1 bg-zinc-800 border border-zinc-700 rounded-sm text-xs text-white focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent cursor-pointer">
                            <option value="admin">Admin</option>
                            <option value="operator">Operator</option>
                            <option value="viewer">Viewer</option>
                          </select>
                        </td>
                        <td class="px-4 py-2.5 text-sm text-zinc-500 hidden sm:table-cell" x-text="u.created_at ? new Date(u.created_at * 1000).toLocaleDateString() : '—'"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>

                <!-- Empty state -->
                <div x-show="users.length === 0" class="text-center py-12 text-zinc-600 text-sm">No users found</div>
              </div>
            </div>

          </div>

          <!-- Right column: Change Password -->
          <div>
            <div x-show="changePasswordSuccess" class="mb-4 text-green-400 text-xs bg-green-400/10 rounded-sm py-2 px-3" x-text="changePasswordSuccess"></div>
            <div x-show="changePasswordError" class="mb-4 text-red-400 text-xs bg-red-400/10 rounded-sm py-2 px-3" x-text="changePasswordError"></div>

            <div class="bg-zinc-900 border border-zinc-800 rounded-sm p-4">
              <form @submit.prevent="changePassword()" class="space-y-3">
                <div>
                  <label class="block text-xs font-medium text-zinc-400 mb-1">Current Password</label>
                  <input type="password" x-model="changePasswordForm.current_password" required autocomplete="current-password"
                    class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
                </div>
                <div>
                  <label class="block text-xs font-medium text-zinc-400 mb-1">New Password</label>
                  <input type="password" x-model="changePasswordForm.new_password" required minlength="8" autocomplete="new-password"
                    class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
                  <p class="text-[11px] text-zinc-600 mt-1">Minimum 8 characters</p>
                </div>
                <div>
                  <label class="block text-xs font-medium text-zinc-400 mb-1">Confirm New Password</label>
                  <input type="password" x-model="changePasswordForm.confirm_password" required minlength="8" autocomplete="new-password"
                    class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
                </div>
                <div class="flex items-center gap-2 pt-1">
                  <button type="submit" :disabled="!changePasswordForm.current_password || !changePasswordForm.new_password || !changePasswordForm.confirm_password"
                    class="px-4 py-2 bg-white hover:bg-zinc-200 disabled:opacity-50 disabled:cursor-not-allowed text-zinc-900 rounded-sm text-sm font-medium transition-all active:scale-[0.98]">
                    Update Password
                  </button>
                </div>
              </form>
            </div>
          </div>

        </div>
      </div>

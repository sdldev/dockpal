    <!-- Top header -->
    <header class="h-14 border-b border-zinc-800 flex items-center gap-3 px-4 shrink-0">
      <button @click="sidebarOpen=!sidebarOpen" class="lg:hidden p-2 rounded-sm hover:bg-zinc-800 text-zinc-400 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="flex-1 flex items-center gap-2 text-sm text-zinc-400">
        <span x-text="currentNavLabel"></span>
      </div>
      <button @click="loadDashboard()" class="p-2 rounded-sm hover:bg-zinc-800 text-zinc-500 hover:text-zinc-300 transition-colors" title="Refresh">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>

      <!-- Profile Dropdown -->
      <div class="relative" x-data="{ profileOpen: false }" @click.outside="profileOpen=false">
        <button @click="profileOpen=!profileOpen"
          class="flex items-center gap-2 p-1 pr-2 rounded-sm hover:bg-zinc-800 text-zinc-300 transition-colors"
          :class="profileOpen ? 'bg-zinc-800' : ''">
          <div class="w-7 h-7 rounded-full bg-zinc-800 flex items-center justify-center text-xs font-medium text-zinc-200" x-text="username?.charAt(0)?.toUpperCase()"></div>
          <span class="text-sm font-medium hidden sm:inline" x-text="username"></span>
          <svg class="w-3.5 h-3.5 text-zinc-500 transition-transform" :class="profileOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <!-- Dropdown menu -->
        <div x-show="profileOpen" x-cloak
          x-transition:enter="transition ease-out duration-100"
          x-transition:enter-start="opacity-0 scale-95"
          x-transition:enter-end="opacity-100 scale-100"
          x-transition:leave="transition ease-in duration-75"
          x-transition:leave-start="opacity-100 scale-100"
          x-transition:leave-end="opacity-0 scale-95"
          class="absolute right-0 top-full mt-1 w-56 bg-zinc-900 border border-zinc-800 rounded-sm shadow-xl z-50 overflow-hidden">
          <!-- User info header -->
          <div class="px-3 py-2.5 border-b border-zinc-800">
            <div class="text-sm font-medium text-white truncate" x-text="username"></div>
            <div class="text-xs text-zinc-500 capitalize" x-text="userRole || 'User'"></div>
          </div>
          <!-- Profile -->
          <button @click="profileOpen=false; currentPage='profile'; loadPageData('profile')"
            class="w-full flex items-center gap-2 px-3 py-2 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span>Profile</span>
          </button>
          <!-- Logout -->
          <button @click="profileOpen=false; logout()"
            class="w-full flex items-center gap-2 px-3 py-2 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-red-400 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </header>

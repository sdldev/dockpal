  <!-- Mobile overlay -->
  <div x-show="sidebarOpen" @click="sidebarOpen=false" class="fixed inset-0 bg-black/60 z-40 lg:hidden" x-cloak></div>

  <!-- Sidebar -->
  <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed lg:static lg:translate-x-0 inset-y-0 left-0 z-50 w-60 bg-zinc-900 border-r border-zinc-800 flex flex-col transition-transform duration-200 sidebar-enter">

    <!-- Logo -->
    <div class="h-14 flex items-center gap-3 px-4 border-b border-zinc-800 shrink-0">
      <span class="text-xl">🐳</span>
      <span class="font-semibold text-white">Dockpal</span>
    </div>

    <!-- Instance Selector (Requirements 10.1, 10.2, 10.3, 10.7) -->
    <div class="px-3 py-2 border-b border-zinc-800">
      <select x-model="selectedInstance" @change="selectInstance(selectedInstance)"
        class="w-full px-2 py-1.5 bg-zinc-950 border border-zinc-800 rounded-sm text-xs text-white focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent cursor-pointer">
        <template x-for="inst in instances" :key="inst.id">
          <option :value="inst.id">
            <span x-text="(inst.id === 'local' ? '⚙️ ' : (inst.status === 'online' ? '🟢 ' : (inst.status === 'offline' ? '🔴 ' : '🟡 '))) + (inst.id === 'local' ? 'This Server' : inst.name)"></span>
          </option>
        </template>
      </select>
    </div>

    <!-- Nav items -->
    <nav class="flex-1 py-3 px-3 overflow-y-auto">
      <template x-for="item in navItems" :key="item.id || item.label">
        <div>
          <!-- Group header -->
          <div x-show="item.type === 'group'" class="pt-4 pb-1 px-3">
            <span class="text-[10px] font-semibold uppercase tracking-widest text-zinc-600" x-text="item.label"></span>
          </div>
          <!-- Nav link -->
          <button x-show="!item.type" @click="currentPage=item.id; sidebarOpen=false; loadPageData(item.id)"
            :class="(currentPage === item.id || (item.id === 'instances' && currentPage === 'add-instance')) ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-white hover:bg-zinc-800/50'"
            class="w-full flex items-center gap-3 px-3 py-2 rounded-sm text-sm font-medium transition-colors">
            <span x-html="item.icon" class="w-5 h-5 flex items-center justify-center"></span>
            <span x-text="item.label"></span>
            <span x-show="item.id === 'images' && imagesWithUpdatesCount > 0"
              class="ml-auto bg-amber-500 text-black text-[10px] font-bold px-1.5 py-0.5 rounded-full"
              x-text="imagesWithUpdatesCount"></span>
            <!-- Apps nav entry: dual-count badge per R4.5
                 - Blue (animated) shows apps currently in pulling/recreating/verifying.
                 - Amber shows apps with an available update that are not yet updating.
                 Either half is hidden when its count is zero. The wrapper handles
                 ml-auto so spacing is correct even when only one half is visible. -->
            <span x-show="item.id === 'apps' && (appsUpdating > 0 || appsWithUpdates > 0)"
              class="ml-auto flex items-center gap-1">
              <span x-show="appsUpdating > 0"
                class="inline-flex items-center gap-1 bg-blue-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full"
                :title="appsUpdating + ' app(s) updating'">
                <svg class="w-2.5 h-2.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" stroke-width="3" class="opacity-25"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M22 12a10 10 0 00-10-10"/>
                </svg>
                <span x-text="appsUpdating"></span>
              </span>
              <span x-show="appsWithUpdates > 0"
                class="bg-amber-500 text-black text-[10px] font-bold px-1.5 py-0.5 rounded-full"
                :title="appsWithUpdates + ' app(s) with updates available'"
                x-text="appsWithUpdates"></span>
            </span>
          </button>
        </div>
      </template>
    </nav>

    <!-- Version footer -->
    <div class="p-3 border-t border-zinc-800 shrink-0">
      <div class="px-2 py-2 flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 min-w-0">
          <svg class="w-4 h-4 text-zinc-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          <div class="text-xs min-w-0">
            <div class="text-zinc-400 font-medium truncate">
              Dockpal v<span x-text="currentVersion"></span>
            </div>
            <div x-show="updateAvailable" class="text-blue-400 truncate cursor-pointer hover:text-blue-300" @click="showUpdateModal()">
              v<span x-text="updateVersion"></span> available
            </div>
            <div x-show="!updateAvailable" class="text-zinc-600 truncate">
              Up to date
            </div>
          </div>
        </div>
        <button @click="manualCheckForUpdates()" :disabled="updateChecking" class="p-1.5 rounded-sm hover:bg-zinc-800 text-zinc-500 hover:text-zinc-300 transition-colors shrink-0 disabled:opacity-50" title="Check for updates">
          <svg :class="updateChecking && 'animate-spin'" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

<!-- Login View -->
<div x-show="view === 'login'" x-cloak class="flex items-center justify-center min-h-screen bg-zinc-950">
  <div class="w-full max-w-sm space-y-6">
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-sm bg-zinc-900 border border-zinc-800">
        <span class="text-2xl">🐳</span>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight text-white">Dockpal</h1>
      <p class="text-sm text-zinc-400">Sign in to manage your containers</p>
    </div>
    <form @submit.prevent="login()" class="space-y-4 bg-zinc-900 border border-zinc-800 rounded-sm p-6">
      <div class="space-y-2">
        <label class="text-xs font-medium text-zinc-400">Username</label>
        <input type="text" x-model="loginForm.username" required autocomplete="username"
          class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition"
          placeholder="admin">
      </div>
      <div class="space-y-2">
        <label class="text-xs font-medium text-zinc-400">Password</label>
        <input type="password" x-model="loginForm.password" required autocomplete="current-password"
          class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-sm text-sm text-white placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition">
      </div>
      <div x-show="error" x-text="error" class="text-red-400 text-xs text-center bg-red-400/10 rounded-sm py-2"></div>
      <button type="submit" :disabled="loading"
        class="w-full py-2.5 px-4 bg-white hover:bg-zinc-200 disabled:opacity-50 text-zinc-900 rounded-sm text-sm font-medium transition-all active:scale-[0.98]">
        <span x-show="!loading">Sign in</span>
        <span x-show="loading" class="flex items-center justify-center gap-2">
          <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          Signing in...
        </span>
      </button>
    </form>
    <p class="text-xs text-center text-zinc-600">Default credentials: admin / admin</p>
  </div>
</div>

<!-- Toast Container -->
<div class="fixed bottom-4 right-4 z-[70] flex flex-col gap-2 pointer-events-none" style="max-width:380px">
  <template x-for="t in toasts" :key="t.id">
    <div class="pointer-events-auto bg-zinc-900 border rounded-sm shadow-2xl px-4 py-3 flex items-start gap-3 min-w-[280px]"
      :class="{
        'border-emerald-500/30': t.type === 'success',
        'border-red-500/30': t.type === 'error',
        'border-amber-500/30': t.type === 'warning',
        'border-blue-500/30': t.type === 'info' || !t.type
      }"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 translate-x-4"
      x-transition:enter-end="opacity-100 translate-x-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0">
      <div class="shrink-0 mt-0.5">
        <svg x-show="t.type === 'success'" class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <svg x-show="t.type === 'error'" class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <svg x-show="t.type === 'warning'" class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <svg x-show="t.type === 'info' || !t.type" class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <p class="text-sm text-zinc-200 flex-1 leading-snug" x-text="t.message"></p>
      <button @click="toasts = toasts.filter(x => x.id !== t.id)" class="shrink-0 text-zinc-500 hover:text-zinc-300 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </template>
</div>

name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          VERSION=${{ github.ref_name }}
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -o dockpal-linux-amd64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dockpal-linux-amd64
          generate_release_notes: true